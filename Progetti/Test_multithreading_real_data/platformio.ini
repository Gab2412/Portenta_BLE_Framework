[platformio]
extra_configs = ../../common_config.ini

# --- 1. SCHEDA CENTRALE ---
[env:h7_m7_central_multithread_real]
extends = m7_base
lib_deps = 
    ${common.lib_deps}
    WiFi.h
    WiFiUdp.h
    chrono
build_src_filter = +<central/**>

# --- 2. SCHEDA SENSORE ---
[env:h7_m7_sensor_multithread_real_01]
extends = m7_base
lib_deps = 
    ${common.lib_deps}
    WiFi.h
    WiFiUdp.h
    chrono
build_flags =
    -I../../shared_lib
    -DSENSOR_ID=01  # <--- Definisce l'ID 1
lib_ldf_mode = deep+
build_src_filter = +<sensor/**>


