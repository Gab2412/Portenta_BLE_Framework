[platformio]
extra_configs = ../../common_config.ini

# --- 1. SCHEDA CENTRALE (Sempre M7) ---
[env:h7_m7_central_WiFi]
extends = m7_base
lib_deps = 
    ${common.lib_deps}
    WiFi.h
    WiFiUdp.h
build_src_filter = +<central/**>

# --- 2. SCHEDA SENSORE (Core M7) ---
[env:h7_m7_sensor_WiFi]
extends = m7_base
lib_deps = 
    ${common.lib_deps}
    WiFi.h
    WiFiUdp.h
lib_ldf_mode = deep+
build_src_filter = +<sensor/**>


