# --- CONFIGURAZIONI GLOBALI CONDIVISE ---

[common]
platform = ststm32
framework = arduino
monitor_speed = 115200

# 1. GESTIONE LIBRERIE
# Cerca librerie prima nella cartella locale, poi in quella condivisa
lib_extra_dirs = 
    ../../shared_lib

# Librerie fisse che vuoi in OGNI progetto (es. RPC per il Dual Core)
lib_deps = 
    arduino-libraries/ArduinoBLE @ ^2.0.0
    # Aggiungi qui altre librerie standard (es. Wire, SPI, WiFi)

build_flags = -O3 ; Ottimizza il codice per la massima velocità
    #commentare o passare in -O2 se ci sono problemi di compilazione o debug

# 2. DEFINIZIONI BASE PER I DUE CORE
[m7_base]
extends = common
board = portenta_h7_m7

[m4_base]
extends = common
board = portenta_h7_m4